<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" style="background:#fff">
  <g fill="none" stroke="#0A0A0A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- left door -->
    <rect x="120" y="180" width="140" height="280" rx="6"/>
    <circle cx="240" cy="320" r="5" fill="#0A0A0A"/>
    <!-- right door -->
    <rect x="340" y="180" width="140" height="280" rx="6"/>
    <circle cx="360" cy="320" r="5" fill="#0A0A0A"/>
    <!-- door labels -->
    <text x="155" y="160" font-family="Caveat, Comic Sans MS, cursive" font-size="42" fill="#0A0A0A" font-weight="700">A</text>
    <text x="395" y="160" font-family="Caveat, Comic Sans MS, cursive" font-size="42" fill="#0A0A0A" font-weight="700">B</text>
    <!-- xiaohei in the middle, hands up confused -->
    <ellipse cx="300" cy="510" rx="42" ry="48" fill="#0A0A0A" stroke="none"/>
    <circle cx="290" cy="505" r="5" fill="#fff" stroke="none"/>
    <circle cx="312" cy="505" r="5" fill="#fff" stroke="none"/>
    <!-- legs -->
    <line x1="285" y1="558" x2="278" y2="595"/>
    <line x1="315" y1="558" x2="322" y2="595"/>
    <!-- arms up shrugging -->
    <line x1="262" y1="490" x2="225" y2="455"/>
    <line x1="338" y1="490" x2="375" y2="455"/>
    <!-- question marks above head -->
  </g>
  <text x="270" y="445" font-family="Caveat, Comic Sans MS, cursive" font-size="46" fill="#F97316" font-style="italic" font-weight="700">?</text>
  <text x="306" y="425" font-family="Caveat, Comic Sans MS, cursive" font-size="38" fill="#F97316" font-style="italic" font-weight="700">?</text>
  <text x="80" y="105" font-family="Caveat, Comic Sans MS, cursive" font-size="32" fill="#F97316" font-style="italic">3 reasons each</text>
  <path d="M180 115 Q210 130 230 150" stroke="#F97316" stroke-width="4" fill="none"/>
  <polygon points="225,147 235,155 232,145" fill="#F97316"/>
</svg>
